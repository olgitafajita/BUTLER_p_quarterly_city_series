# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python
name: Python application
env:
  REDIVIS_API_TOKEN: ${{ secrets.REDIVIS_API_TOKEN }}
on:
  # This allows you to run the workflow manually from the Actions tab
  workflow_dispatch:
  # This schedules the workflow to run automatically
  # cron format is: MINUTE HOUR DAY-OF-MONTH MONTH DAY-OF-WEEK
  # Runs at 2:00 UTC on Jan 8, Apr 8, Jul 8, Oct 8 (one week after each quarter ends)
  schedule:
    - cron: '0 2 8 1,4,7,10 *'
permissions:
  contents: read
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.10
      uses: actions/setup-python@v3
      with:
        python-version: "3.10"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip 
        python -m pip install --upgrade pip setuptools
        pip install flake8 requests redivis dotenv
        # Install dependencies from requirements.txt if it exists
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    - name: Lint with flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    - name: Run app.py
      run: |
        python app.py
